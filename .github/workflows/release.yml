# Build native binaries and publish a GitHub Release on version tags (v*).
# Also runnable manually from the Actions tab.

name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.3.0). Required to publish a release from a manual run."
        required: true
        default: "v1.3.0"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Reliable free runners — avoid macos-13 (often stuck in queue forever)
          - os: windows-latest
            name: windows-x64
            artifact: AcerPopGoCompanion-windows-x64.exe
          - os: ubuntu-22.04
            name: linux-x64
            artifact: AcerPopGoCompanion-linux-x64
          - os: macos-latest
            name: macos-arm64
            artifact: AcerPopGoCompanion-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI / HID build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libhidapi-hidraw0 libhidapi-libusb0 libhidapi-dev \
            libusb-1.0-0-dev \
            python3-tk \
            libxkbcommon0 libgtk-3-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean popgo.spec

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\AcerPopGoCompanion.exe")) {
            Get-ChildItem -Recurse dist | Format-Table
            throw "Windows exe missing"
          }
          Copy-Item "dist\AcerPopGoCompanion.exe" "${{ matrix.artifact }}"
          Get-Item "${{ matrix.artifact }}" | Format-List Name, Length

      - name: Package Linux artifact
        if: runner.os == 'Linux'
        run: |
          test -f dist/AcerPopGoCompanion
          cp dist/AcerPopGoCompanion "${{ matrix.artifact }}"
          chmod +x "${{ matrix.artifact }}"
          cp packaging/99-acer-popgo.rules .
          tar -czf "${{ matrix.artifact }}.tar.gz" \
            "${{ matrix.artifact }}" 99-acer-popgo.rules README.md LICENSE
          ls -la "${{ matrix.artifact }}"*

      - name: Package macOS artifact
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/AcerPopGoCompanion.app" ]; then
            ditto -c -k --keepParent "dist/AcerPopGoCompanion.app" "${{ matrix.artifact }}.zip"
          elif [ -f "dist/AcerPopGoCompanion" ]; then
            cp dist/AcerPopGoCompanion "${{ matrix.artifact }}"
            chmod +x "${{ matrix.artifact }}"
            zip -9 "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          else
            echo "No macOS binary produced" >&2
            ls -laR dist || true
            exit 1
          fi
          ls -la "${{ matrix.artifact }}"*

      - name: Upload Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

      - name: Upload Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

      - name: Upload macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Publish even if one OS failed (upload whatever succeeded)
    if: always() && needs.build.result != 'cancelled' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: |
          mkdir -p out
          find release-assets -type f -print
          # Flatten any nested dirs
          find release-assets -type f \( -name '*.exe' -o -name '*.tar.gz' -o -name '*.zip' \) \
            -exec cp -v {} out/ \;
          echo "--- out/ ---"
          ls -la out/ || true
          test "$(ls -A out 2>/dev/null)" || (echo "No release assets found" && exit 1)

      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Acer PopGo Companion ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## Acer PopGo Companion ${{ steps.tag.outputs.name }}

            Unofficial companion for the **Acer PopGo** wireless mouse — battery %, tray, DPI tracker.

            ### Downloads

            | Platform | File |
            |----------|------|
            | **Windows x64** | `AcerPopGoCompanion-windows-x64.exe` |
            | **Linux x64** | `AcerPopGoCompanion-linux-x64.tar.gz` |
            | **macOS Apple Silicon** | `AcerPopGoCompanion-macos-arm64.zip` |

            > Intel Mac: build from source (`pip install -r requirements.txt && python app.py`) or use PyInstaller locally.

            ### Quick start (Windows)

            1. Download `AcerPopGoCompanion-windows-x64.exe`
            2. Run it (SmartScreen → More info → Run anyway if prompted)
            3. Plug in the **2.4 GHz USB dongle**, *or* pair **Acer PopGo BT5.4** over Bluetooth

            ### Linux

            ```bash
            tar -xzf AcerPopGoCompanion-linux-x64.tar.gz
            sudo cp 99-acer-popgo.rules /etc/udev/rules.d/
            sudo udevadm control --reload-rules && sudo udevadm trigger
            ./AcerPopGoCompanion-linux-x64
            ```

            ### macOS

            Unzip, then if Gatekeeper blocks: right-click → Open, or `xattr -cr` the app.

            ### Notes

            - **2.4 GHz dongle** (`32C2:0066`): HID battery + LiPo voltage estimate
            - **Windows BLE** (`32C2:0026` / Acer PopGo BT5.4): standard GATT Battery Level `0x2A19` (preferred when connected)
            - Green charge LED and software DPI are **not** available over the radio (on-device only)
            - Not affiliated with Acer Inc. · MIT License
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
